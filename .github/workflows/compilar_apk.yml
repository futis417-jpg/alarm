name: Compilar APK de Despertador

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Dar permisos de ejecucion a Gradle usando ruta exacta
      run: |
        # Entramos directamente usando el comodin de la ruta que subio AI Studio
        cd **/alarm-0bfb564b6e7df8ed4e7b65cdfb53cc949ddec332
        chmod +x gradlew
        echo "Ruta guardada con exito"

    - name: Compilar la aplicacion en modo Debug
      run: |
        cd **/alarm-0bfb564b6e7df8ed4e7b65cdfb53cc949ddec332
        ./gradlew assembleDebug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Despertador-APK
        path: |
          **/build/outputs/apk/debug/app-debug.apk

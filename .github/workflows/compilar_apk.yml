name: Compilar APK de Despertador

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Mover archivos a la raiz principal
      run: |
        # Buscamos donde esta el archivo settings.gradle.kts para saber donde estan tus archivos
        RUTA_PROYECTO=$(dirname $(find . -name "settings.gradle.kts" -print -quit))
        echo "Moviendo todo desde $RUTA_PROYECTO hacia la raiz..."
        
        # Movemos todos los archivos ocultos y normales al directorio principal
        shopt -s dotglob
        mv "$RUTA_PROYECTO"/* . 2>/dev/null || true
        
        # Verificamos que gradlew este ahora en la raiz
        ls -la

    - name: Dar permisos de ejecucion a Gradle
      run: chmod +x ./gradlew

    - name: Compilar la aplicacion en modo Debug
      run: ./gradlew assembleDebug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Despertador-APK
        path: |
          **/build/outputs/apk/debug/app-debug.apk

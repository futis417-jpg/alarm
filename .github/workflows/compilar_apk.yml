name: Compilar APK de Despertador

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Aquí le decimos a GitHub que todos los comandos se ejecuten dentro de tu carpeta del proyecto
defaults:
  run:
    working-directory: alarm-0bfb564b6e7df8ed4e7b65cdfb53cc949ddec332

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Dar permisos de ejecucion a Gradle
      run: chmod +x ./gradlew

    - name: Compilar la aplicacion en modo Debug
      run: ./gradlew assembleDebug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Despertador-APK
        # Apuntamos también a la ruta de salida dentro de tu carpeta
        path: alarm-0bfb564b6e7df8ed4e7b65cdfb53cc949ddec332/app/build/outputs/apk/debug/app-debug.apk

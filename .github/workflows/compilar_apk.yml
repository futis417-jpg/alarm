name: Compilar APK de Despertador

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Diagnostico de carpetas y permisos
      run: |
        echo "=== CARPETAS EN LA RAIZ ==="
        ls -la
        
        echo "=== BUSCANDO GRADLEW ==="
        # Buscamos la ruta real del archivo ejecutable
        REAL_PATH=$(find . -name "gradlew" -print -quit)
        echo "El archivo gradlew esta en: $REAL_PATH"
        
        # Guardamos la carpeta contenedora para el siguiente paso
        DIR_PATH=$(dirname "$REAL_PATH")
        echo "DIR_PATH=$DIR_PATH" >> $GITHUB_ENV
        
        # Le damos los permisos de ejecucion directamente usando su ruta real encontrada
        chmod +x "$REAL_PATH"

    - name: Compilar la aplicacion en modo Debug
      run: |
        cd "${{ env.DIR_PATH }}"
        ./gradlew assembleDebug

    - name: Guardar el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Despertador-APK
        path: |
          **/build/outputs/apk/debug/app-debug.apk
